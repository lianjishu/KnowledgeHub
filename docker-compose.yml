services:
  # MongoDB数据库
  mongodb:
    image: mongo:7
    container_name: blog-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: blog
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    ports:
      - "27017:27017"
    networks:
      - blog-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # Spring Boot后端 (Java) - 默认使用
  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/blog?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRE_MINUTES: 10080
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
      ALLOWED_FILE_TYPES: jpg,jpeg,png,gif,webp
      LOG_LEVEL: INFO
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI后端 (Python) - 保留作为参考，如需使用请注释上方Java后端并取消下面注释
  # backend:
  #   build:
  #     context: ./backend-python
  #     dockerfile: Dockerfile
  #   container_name: blog-backend
  #   restart: always
  #   environment:
  #     NODE_ENV: production
  #     PORT: 8000
  #     HOST: 0.0.0.0
  #     MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/blog?authSource=admin
  #     JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
  #     JWT_ALGORITHM: HS256
  #     JWT_EXPIRE_MINUTES: 10080
  #     UPLOAD_DIR: /app/uploads
  #     MAX_FILE_SIZE: 10485760
  #     ALLOWED_FILE_TYPES: jpg,jpeg,png,gif,webp
  #     LOG_LEVEL: INFO
  #     LOG_DIR: /app/logs
  #     CORS_ORIGINS: *
  #   volumes:
  #     - uploads_data:/app/uploads
  #     - ./backend-python/logs:/app/logs
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
  #   networks:
  #     - blog-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # Vue前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blog-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - blog-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  blog-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
